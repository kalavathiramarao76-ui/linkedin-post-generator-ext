<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)" opacity="0.4"/>

  <!-- Radial halo behind nib -->
  <circle cx="64" cy="58" r="40" fill="url(#halo)"/>

  <!-- Radiating light rays -->
  <g opacity="0.2" filter="url(#soft-glow)">
    <line x1="64" y1="55" x2="64" y2="18" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="88" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="40" y2="22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="100" y2="35" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="28" y2="35" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="105" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="23" y2="50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="95" y2="28" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="33" y2="28" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="108" y2="42" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
    <line x1="64" y1="55" x2="20" y2="42" stroke="#ffffff" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Quill nib - main body -->
  <g filter="url(#shadow)">
    <path d="M64 30 L78 75 Q74 82 64 98 Q54 82 50 75 Z" fill="#ffffff" opacity="0.95"/>
    <path d="M64 42 L64 78" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="64" cy="78" rx="2.5" ry="4" fill="#2563eb" opacity="0.5"/>
    <path d="M64 30 L56 65 L64 75 Z" fill="#ffffff" opacity="0.15"/>
    <path d="M64 30 L78 75 L64 98 Z" fill="#1e3a8a" opacity="0.08"/>
    <path d="M60 88 Q64 100 68 88" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- Ink drops from nib tip -->
  <circle cx="64" cy="104" r="2.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="60" cy="109" r="1.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="69" cy="111" r="1.3" fill="#ffffff" opacity="0.35"/>

  <!-- 4-pointed sparkle stars -->
  <g fill="#ffffff" filter="url(#glow-filter)">
    <path d="M30 30 L31.5 33 L30 36 L28.5 33 Z" opacity="0.8"/>
    <path d="M30 30 L33 31.5 L30 33 L27 31.5 Z" opacity="0.8"/>
    <path d="M96 26 L97 28.5 L96 31 L95 28.5 Z" opacity="0.6"/>
    <path d="M96 26 L98.5 27 L96 28.5 L93.5 27 Z" opacity="0.6"/>
    <path d="M24 62 L25 64 L24 66 L23 64 Z" opacity="0.5"/>
    <path d="M24 62 L26 63 L24 64 L22 63 Z" opacity="0.5"/>
    <path d="M102 55 L103 57.5 L102 60 L101 57.5 Z" opacity="0.7"/>
    <path d="M102 55 L104.5 56 L102 57.5 L99.5 56 Z" opacity="0.7"/>
    <path d="M35 90 L35.8 91.5 L35 93 L34.2 91.5 Z" opacity="0.4"/>
    <path d="M35 90 L36.5 90.8 L35 91.5 L33.5 90.8 Z" opacity="0.4"/>
    <path d="M75 18 L75.6 19.2 L75 20.4 L74.4 19.2 Z" opacity="0.55"/>
    <path d="M75 18 L76.2 18.6 L75 19.2 L73.8 18.6 Z" opacity="0.55"/>
  </g>
</svg>