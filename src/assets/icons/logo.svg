<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Quill/Feather pen -->
  <g fill="white" transform="translate(28, 20)">
    <!-- Feather body -->
    <path d="M58,12 C52,22 44,32 34,42 C28,48 22,54 16,60 L12,64 C10,66 8,68 6,70 L4,72 C3,73 2,75 2,76 C2,78 4,78 6,76 L10,72 C10,72 8,80 6,88 L10,84 C14,76 18,70 22,64 C28,56 36,46 46,36 C54,28 60,20 62,14 C62,12 60,10 58,12 Z" opacity="0.95"/>
    <!-- Feather vane lines -->
    <path d="M50,20 C44,28 36,36 28,44" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    <path d="M54,18 C46,28 38,38 28,48" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    <path d="M46,24 C40,32 32,40 24,48" stroke="rgba(255,255,255,0.3)" stroke-width="1" fill="none"/>
    <!-- Pen nib -->
    <path d="M6,88 L4,96 L10,90 L6,88 Z" opacity="0.9"/>
  </g>
  <!-- Sparkle star top-right -->
  <g fill="white" transform="translate(82, 24)">
    <path d="M8,0 L9.5,5.5 L16,8 L9.5,10.5 L8,16 L6.5,10.5 L0,8 L6.5,5.5 Z"/>
  </g>
  <!-- Small sparkle -->
  <g fill="white" opacity="0.7" transform="translate(72, 42)">
    <path d="M4,0 L5,3 L8,4 L5,5 L4,8 L3,5 L0,4 L3,3 Z"/>
  </g>
  <!-- Tiny sparkle -->
  <g fill="white" opacity="0.5" transform="translate(92, 40)">
    <path d="M3,0 L3.8,2.2 L6,3 L3.8,3.8 L3,6 L2.2,3.8 L0,3 L2.2,2.2 Z"/>
  </g>
</svg>